# march Hyprland config layer

$mainMod = SUPER
$marchLauncher = bash -lc 'if command -v rofi >/dev/null 2>&1; then rofi -show drun -config "$HOME/macrch/rofi/config.rasi"; else fuzzel --config "$HOME/macrch/fuzzel/fuzzel.ini"; fi'

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
}

decoration {
    rounding = 16

    blur {
        enabled = true
        size = 8
        passes = 3
    }
}

animations {
    enabled = true
}

bind = $mainMod, SPACE, exec, $marchLauncher
