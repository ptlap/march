# march Hyprland config layer

$mainMod = SUPER
$marchLauncher = ~/macrch/scripts/command-palette.sh

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
}

decoration {
    rounding = 16

    blur {
        enabled = true
        size = 8
        passes = 3
    }
}

animations {
    enabled = true
}

bind = $mainMod, SPACE, exec, $marchLauncher

# Super release opens march overview. Interrupts keep normal Super combos from
# also opening overview when the key is released.
bindid = $mainMod, Super_L, Toggle march overview, global, quickshell:marchOverviewToggleRelease
bindid = $mainMod, Super_R, Toggle march overview, global, quickshell:marchOverviewToggleRelease
binditn = $mainMod, catchall, global, quickshell:marchOverviewInterrupt
bind = Ctrl, Super_L, global, quickshell:marchOverviewInterrupt
bind = Ctrl, Super_R, global, quickshell:marchOverviewInterrupt
bind = $mainMod, mouse:272, global, quickshell:marchOverviewInterrupt
bind = $mainMod, mouse:273, global, quickshell:marchOverviewInterrupt
bind = $mainMod, mouse:274, global, quickshell:marchOverviewInterrupt
bind = $mainMod, mouse_up, global, quickshell:marchOverviewInterrupt
bind = $mainMod, mouse_down, global, quickshell:marchOverviewInterrupt

layerrule = match:namespace quickshell:march:overview, no_anim on
layerrule = match:namespace quickshell:march:overview, blur on
layerrule = match:namespace quickshell:march:overview, ignore_alpha 0.6
